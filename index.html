<script>
let state = {
  trips: [],
  totalMiles: 0,
  trackedSessions: [],
  weekData: { Monday:0, Tuesday:0, Wednesday:0, Thursday:0, Friday:0, Saturday:0, Sunday:0 },
  weekHours: { Monday:0, Tuesday:0, Wednesday:0, Thursday:0, Friday:0, Saturday:0, Sunday:0 },
  weekTrips: { Monday:0, Tuesday:0, Wednesday:0, Thursday:0, Friday:0, Saturday:0, Sunday:0 },
  tracking: {
    active: false,
    watchId: null,
    startTime: null,
    lastPosition: null,
    miles: 0,
    points: 0,
    timerInterval: null
  }
};

// Update this if you want a different mileage deduction rate.
const IRS_RATE = 0.67;

const PLATFORM_COLORS = {
  uber: { bg:'rgba(255,255,255,0.12)', color:'#fff', label:'UBER' },
  doordash: { bg:'rgba(255,48,8,0.2)', color:'#FF3008', label:'DD' },
  grubhub: { bg:'rgba(246,52,64,0.2)', color:'#F63440', label:'GH' },
  lyft: { bg:'rgba(255,0,191,0.2)', color:'#FF00BF', label:'LYFT' },
  ubereats: { bg:'rgba(0,255,136,0.15)', color:'#00FF88', label:'UE' },
  tracking: { bg:'rgba(61,158,255,0.2)', color:'#3D9EFF', label:'GPS' }
};

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', {
  weekday:'short',
  month:'short',
  day:'numeric'
}).toUpperCase();

buildWeekChart();
updateMilesUI();
renderTrackedSessions();

function switchTab(name, tabEl) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');

  if (tabEl) {
    tabEl.classList.add('active');
  } else {
    const tabMap = {
      home: 0,
      profit: 1,
      miles: 2,
      weekly: 3
    };
    const tabs = document.querySelectorAll('.tab');
    if (tabs[tabMap[name]]) tabs[tabMap[name]].classList.add('active');
  }
}

function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

function filterPlatform(p, el) {
  document.querySelectorAll('.pill').forEach(pi => pi.classList.remove('active'));
  el.classList.add('active');
  renderTripLog(p);
}

function logTrip() {
  const platform = document.getElementById('q-platform').value;
  const earned = parseFloat(document.getElementById('q-earned').value) || 0;
  const miles = parseFloat(document.getElementById('q-miles').value) || 0;
  const mins = parseFloat(document.getElementById('q-mins').value) || 0;

  if (!earned) {
    alert('Please enter at least an earnings amount.');
    return;
  }

  const gasCost = miles * 0.12;
  const realProfit = earned - gasCost;
  const rate = mins > 0 ? (realProfit / (mins / 60)) : 0;

  const trip = {
    platform,
    earned,
    miles,
    mins,
    gasCost,
    realProfit,
    rate,
    time: new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }),
    id: Date.now()
  };

  state.trips.unshift(trip);
  state.totalMiles += miles;

  document.getElementById('q-earned').value = '';
  document.getElementById('q-miles').value = '';
  document.getElementById('q-mins').value = '';

  updateHomeStats();
  updateMilesUI();
  renderTripLog('all');
}

function updateHomeStats() {
  const trips = state.trips;
  const totalEarned = trips.reduce((s, t) => s + t.earned, 0);
  const totalProfit = trips.reduce((s, t) => s + t.realProfit, 0);
  const totalMins = trips.reduce((s, t) => s + t.mins, 0);
  const totalMiles = trips.reduce((s, t) => s + t.miles, 0);
  const rate = totalMins > 0 ? totalProfit / (totalMins / 60) : 0;

  document.getElementById('h-today').textContent = `$${totalEarned.toFixed(2)}`;
  document.getElementById('h-profit').textContent = `$${totalProfit.toFixed(2)}`;
  document.getElementById('h-miles').textContent = `${totalMiles.toFixed(1)} mi`;
  document.getElementById('h-deduct').textContent = `$${(totalMiles * IRS_RATE).toFixed(2)} tax deduction`;
  document.getElementById('h-rate').textContent = `$${rate.toFixed(2)}`;
  document.getElementById('h-trips').textContent = `${trips.length} trip${trips.length !== 1 ? 's' : ''} logged`;
}

function renderTripLog(filter) {
  const log = document.getElementById('tripLog');
  const trips = filter === 'all' ? state.trips : state.trips.filter(t => t.platform === filter);

  if (!trips.length) {
    log.innerHTML = `<div class="empty"><div class="e-icon">🚗</div>No trips yet${filter !== 'all' ? ' for this platform' : ' today'}.<br/>Log your first trip above!</div>`;
    return;
  }

  log.innerHTML = trips.map(t => {
    const pc = PLATFORM_COLORS[t.platform] || PLATFORM_COLORS.uber;
    return `
      <div class="trip-item">
        <div class="trip-left">
          <div class="platform-icon" style="background:${pc.bg};color:${pc.color}">${pc.label}</div>
          <div class="trip-info">
            <div class="t-name">${t.miles.toFixed(1)} mi · ${t.mins} min</div>
            <div class="t-meta">${t.time} · Gas est. -$${t.gasCost.toFixed(2)}</div>
          </div>
        </div>
        <div class="trip-right">
          <div class="t-earn">+$${t.earned.toFixed(2)}</div>
          <div class="t-profit" style="color:${t.realProfit >= 0 ? 'var(--green)' : 'var(--red)'}">
            Profit: $${t.realProfit.toFixed(2)}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function calcProfit() {
  const gross = parseFloat(document.getElementById('p-gross').value) || 0;
  const miles = parseFloat(document.getElementById('p-miles').value) || 0;
  const gas = parseFloat(document.getElementById('p-gas').value) || 0;
  const hours = parseFloat(document.getElementById('p-hours').value) || 0;
  const other = parseFloat(document.getElementById('p-other').value) || 0;
  const tips = parseFloat(document.getElementById('p-tips').value) || 0;

  if (!gross) {
    alert('Please enter gross earnings.');
    return;
  }

  const totalEarned = gross + tips;
  const totalExpenses = gas + other;
  const mileDeduct = miles * IRS_RATE;
  const realProfit = totalEarned - totalExpenses;
  const perHour = hours > 0 ? realProfit / hours : 0;
  const perMile = miles > 0 ? realProfit / miles : 0;

  const res = document.getElementById('profitResult');
  const amtEl = document.getElementById('pr-amount');

  amtEl.textContent = `$${realProfit.toFixed(2)}`;
  amtEl.className = `p-amount ${realProfit >= 0 ? 'green' : 'red'}`;
  document.getElementById('pr-perhour').textContent = `$${perHour.toFixed(2)}/hr`;
  document.getElementById('pr-permile').textContent = `$${perMile.toFixed(2)}/mi`;
  document.getElementById('pr-taxsave').textContent = `$${mileDeduct.toFixed(2)}`;

  const verdict = document.getElementById('pr-verdict');
  if (perHour >= 20) {
    verdict.textContent = `🔥 Great session! $${perHour.toFixed(2)}/hr is above average.`;
    verdict.className = 'verdict good';
  } else if (perHour >= 12) {
    verdict.textContent = `👍 Decent run. Consider peak hours to boost your rate.`;
    verdict.className = 'verdict ok';
  } else {
    verdict.textContent = `⚠️ Below $12/hr. Check gas costs and avoid low-pay orders.`;
    verdict.className = 'verdict bad';
  }

  res.classList.add('show');

  const aiBox = document.getElementById('profitAI');
  aiBox.className = 'ai-insight';
  aiBox.textContent = `You kept $${realProfit.toFixed(2)} after $${totalExpenses.toFixed(2)} in expenses. At $${perHour.toFixed(2)}/hr, ${perHour >= 20 ? "you're performing well — keep targeting peak windows." : "try targeting busy hours and cutting dead miles between trips."}`;
}

function addMiles() {
  const add = parseFloat(document.getElementById('m-add').value) || 0;

  if (!add) {
    alert('Please enter miles to add.');
    return;
  }

  state.totalMiles += add;
  document.getElementById('m-add').value = '';
  updateMilesUI();
}

function updateMilesUI() {
  const goal = parseFloat(document.getElementById('m-goal')?.value) || 300;
  const mpg = parseFloat(document.getElementById('m-mpg')?.value) || 28;
  const gasprice = parseFloat(document.getElementById('m-gasprice')?.value) || 3.50;

  const total = state.totalMiles;
  const deduct = total * IRS_RATE;
  const gasCost = mpg > 0 ? (total / mpg) * gasprice : 0;
  const avgPerDay = total / 7;
  const pct = goal > 0 ? Math.min(100, Math.round((total / goal) * 100)) : 0;

  document.getElementById('m-total').textContent = total.toFixed(1);
  document.getElementById('m-deduct').textContent = `$${deduct.toFixed(0)}`;
  document.getElementById('m-avg').textContent = avgPerDay.toFixed(1);
  document.getElementById('m-cost').textContent = `$${gasCost.toFixed(0)}`;
  document.getElementById('m-goalPct').textContent = `${pct}%`;
  document.getElementById('m-bar').style.width = `${pct}%`;
}

function startMileageTracking() {
  if (!navigator.geolocation) {
    alert('Geolocation is not supported on this device/browser.');
    return;
  }

  if (state.tracking.active) return;

  state.tracking.active = true;
  state.tracking.startTime = Date.now();
  state.tracking.lastPosition = null;
  state.tracking.miles = 0;
  state.tracking.points = 0;

  document.getElementById('track-status').textContent = 'LIVE';
  document.getElementById('track-status').classList.add('tracking-live');
  document.getElementById('startTrackBtn').style.display = 'none';
  document.getElementById('stopTrackBtn').style.display = 'block';

  state.tracking.timerInterval = setInterval(updateTrackingTimer, 1000);
  updateTrackingTimer();

  state.tracking.watchId = navigator.geolocation.watchPosition(
    handleTrackingPosition,
    handleTrackingError,
    {
      enableHighAccuracy: true,
      maximumAge: 3000,
      timeout: 10000
    }
  );
}

function stopMileageTracking() {
  if (!state.tracking.active) return;

  if (state.tracking.watchId !== null) {
    navigator.geolocation.clearWatch(state.tracking.watchId);
  }

  clearInterval(state.tracking.timerInterval);

  const durationMs = Date.now() - state.tracking.startTime;
  const mins = Math.round(durationMs / 60000);
  const miles = state.tracking.miles;

  state.totalMiles += miles;

  const session = {
    id: Date.now(),
    miles,
    mins,
    time: new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }),
    platform: 'tracking'
  };

  state.trackedSessions.unshift(session);

  state.tracking.active = false;
  state.tracking.watchId = null;
  state.tracking.startTime = null;
  state.tracking.lastPosition = null;
  state.tracking.points = 0;
  state.tracking.miles = 0;
  state.tracking.timerInterval = null;

  document.getElementById('track-status').textContent = 'OFF';
  document.getElementById('track-status').classList.remove('tracking-live');
  document.getElementById('track-time').textContent = '00:00:00';
  document.getElementById('track-miles').textContent = '0.00 mi';
  document.getElementById('track-points').textContent = '0 GPS points';
  document.getElementById('startTrackBtn').style.display = 'block';
  document.getElementById('stopTrackBtn').style.display = 'none';

  updateMilesUI();
  renderTrackedSessions();
}

function handleTrackingPosition(position) {
  const { latitude, longitude, accuracy, speed } = position.coords;

  if (accuracy > 100) return;

  const newPoint = { latitude, longitude };

  if (state.tracking.lastPosition) {
    const distMiles = calculateDistanceMiles(
      state.tracking.lastPosition.latitude,
      state.tracking.lastPosition.longitude,
      newPoint.latitude,
      newPoint.longitude
    );

    // Ignore tiny GPS jitter
    if (distMiles > 0.01) {
      // Optional speed gate to reduce false movement
      const moving = speed === null || speed === undefined || speed > 1;
      if (moving) {
        state.tracking.miles += distMiles;
      }
    }
  }

  state.tracking.lastPosition = newPoint;
  state.tracking.points += 1;

  document.getElementById('track-miles').textContent = `${state.tracking.miles.toFixed(2)} mi`;
  document.getElementById('track-points').textContent = `${state.tracking.points} GPS points`;
}

function handleTrackingError(error) {
  alert(`Location error: ${error.message}`);
  stopMileageTracking();
}

function updateTrackingTimer() {
  if (!state.tracking.active || !state.tracking.startTime) return;

  const elapsed = Date.now() - state.tracking.startTime;
  const hrs = Math.floor(elapsed / 3600000);
  const mins = Math.floor((elapsed % 3600000) / 60000);
  const secs = Math.floor((elapsed % 60000) / 1000);

  document.getElementById('track-time').textContent =
    `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function calculateDistanceMiles(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function toRad(value) {
  return value * Math.PI / 180;
}

function renderTrackedSessions() {
  const log = document.getElementById('sessionLog');
  if (!log) return;

  if (!state.trackedSessions.length) {
    log.innerHTML = `<div class="empty"><div class="e-icon">🗺️</div>No tracked sessions yet.<br/>Start tracking to log your mileage automatically.</div>`;
    return;
  }

  log.innerHTML = state.trackedSessions.map(s => {
    const pc = PLATFORM_COLORS.tracking;
    return `
      <div class="trip-item">
        <div class="trip-left">
          <div class="platform-icon" style="background:${pc.bg};color:${pc.color}">${pc.label}</div>
          <div class="trip-info">
            <div class="t-name">${s.miles.toFixed(2)} mi auto-tracked</div>
            <div class="t-meta">${s.time} · ${s.mins} min session</div>
          </div>
        </div>
        <div class="trip-right">
          <div class="t-earn">${(s.miles * IRS_RATE).toFixed(2)}</div>
          <div class="t-profit" style="color:var(--blue)">Deduction Value</div>
        </div>
      </div>
    `;
  }).join('');
}

function buildWeekChart() {
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const chart = document.getElementById('weekChart');
  chart.innerHTML = '';

  const vals = days.map(d => state.weekData[d]);
  const max = Math.max(...vals, 1);

  days.forEach(day => {
    const val = state.weekData[day];
    const pct = Math.round((val / max) * 100);
    const isToday = new Date().toLocaleDateString('en-US', { weekday:'long' }) === day;

    const wrap = document.createElement('div');
    wrap.className = 'day-bar-wrap';

    const bar = document.createElement('div');
    bar.className = 'day-bar';
    bar.style.height = `${Math.max(pct, 4)}%`;
    bar.style.background = isToday
      ? 'var(--lime)'
      : val > 0
      ? 'linear-gradient(180deg, var(--blue), rgba(61,158,255,0.4))'
      : 'rgba(255,255,255,0.06)';
    bar.setAttribute('data-val', val > 0 ? `$${val.toFixed(0)}` : '$0');
    bar.style.boxShadow = isToday ? '0 0 12px rgba(200,241,53,0.4)' : '';

    wrap.appendChild(bar);
    chart.appendChild(wrap);
  });
}

function addWeekDay() {
  const day = document.getElementById('w-day').value;
  const earn = parseFloat(document.getElementById('w-earn').value) || 0;
  const hrs = parseFloat(document.getElementById('w-hrs').value) || 0;
  const trps = parseInt(document.getElementById('w-trp').value) || 0;

  if (!earn) {
    alert('Please enter earnings.');
    return;
  }

  state.weekData[day] = earn;
  state.weekHours[day] = hrs;
  state.weekTrips[day] = trps;

  document.getElementById('w-earn').value = '';
  document.getElementById('w-hrs').value = '';
  document.getElementById('w-trp').value = '';

  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const total = days.reduce((s, d) => s + state.weekData[d], 0);
  const totHrs = days.reduce((s, d) => s + state.weekHours[d], 0);
  const totTrps = days.reduce((s, d) => s + state.weekTrips[d], 0);
  const rate = totHrs > 0 ? total / totHrs : 0;
  const bestDay = days.reduce((best, d) => state.weekData[d] > state.weekData[best] ? d : best, 'Monday');

  document.getElementById('w-total').textContent = `$${total.toFixed(0)}`;
  document.getElementById('w-rate').textContent = `$${rate.toFixed(0)}/hr`;
  document.getElementById('w-bestday').textContent = bestDay.slice(0,3).toUpperCase();
  document.getElementById('w-trips').textContent = totTrps;

  buildWeekChart();

  document.getElementById('weeklyAI').textContent =
    `You earned $${total.toFixed(2)} this week across ${totTrps} trips. ${bestDay} was your strongest day at $${state.weekData[bestDay].toFixed(2)}. Double down on your best hours and cut idle time between orders next week.`;
}
</script>
